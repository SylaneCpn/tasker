name: tasker
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  awesome_notifications: ^0.11.0
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  workmanager: ^0.9.0+3
  result:
    git : https://github.com/SylaneCpn/result.git
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  rename: ^3.1.0
  change_app_package_name: ^1.5.0
  test: ^1.30.0

flutter:
  uses-material-design: true
  assets:
    - assets/lang/
  fonts:
    - family: HankenGrotesk
      fonts:
        - asset: fonts/HankenGrotesk-Regular.ttf
        - asset: fonts/HankenGrotesk-Italic.ttf
          style: italic
        - asset: fonts/HankenGrotesk-Bold.ttf
          weight: 700
